apiVersion: batch/v1
kind: Job
metadata:
  name: $TEST_NAME
  namespace: $RUNTIME_NAMESPACE
  labels:
    lenscloud.io/managed-by: platform
    lenscloud.io/resource-kind: bench-command
  annotations:
    lenscloud.io/bench-command-family: bench
    lenscloud.io/bench-command: bench.update
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        lenscloud.io/managed-by: platform
        lenscloud.io/resource-kind: bench-command
      annotations:
        lenscloud.io/bench-command-family: bench
        lenscloud.io/bench-command: bench.update
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      containers:
        - name: bench-update
          image: $RELEASE_GROUP_IMAGE
          securityContext:
            privileged: false
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              bench --site all set-config -p maintenance_mode 1
              bench --site all set-config -p pause_scheduler 1
              bench --site all migrate
              bench --site all set-config -p maintenance_mode 0
              bench --site all set-config -p pause_scheduler 0
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites
              subPath: frappe-sites
              readOnly: false
            - name: sites-assets
              mountPath: /home/frappe/frappe-bench/sites/assets
              subPath: frappe-sites/assets
              readOnly: false
      volumes:
        - name: sites
          persistentVolumeClaim:
            claimName: $REAL_SITES_PVC
        - name: sites-assets
          persistentVolumeClaim:
            claimName: $REAL_SITES_PVC
