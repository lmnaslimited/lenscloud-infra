apiVersion: batch/v1
kind: Job
metadata:
  name: $TEST_NAME
  namespace: $RUNTIME_NAMESPACE
  labels:
    lenscloud.io/managed-by: platform
    lenscloud.io/resource-kind: bench-command
  annotations:
    lenscloud.io/bench-command-family: site_app
    lenscloud.io/bench-command: site_app.install
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        lenscloud.io/managed-by: platform
        lenscloud.io/resource-kind: bench-command
      annotations:
        lenscloud.io/bench-command-family: site_app
        lenscloud.io/bench-command: site_app.install
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      containers:
        - name: site-app-install
          image: $RELEASE_GROUP_IMAGE
          securityContext:
            privileged: false
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              bench --site "$REAL_SITE" install-app "$INSTALL_APP"
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites
              subPath: frappe-sites
              readOnly: false
            - name: sites-assets
              mountPath: /home/frappe/frappe-bench/sites/assets
              subPath: frappe-sites/assets
              readOnly: false
      volumes:
        - name: sites
          persistentVolumeClaim:
            claimName: $REAL_SITES_PVC
        - name: sites-assets
          persistentVolumeClaim:
            claimName: $REAL_SITES_PVC
