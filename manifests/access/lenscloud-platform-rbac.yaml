apiVersion: v1
kind: Namespace
metadata:
  name: lenscloud-platform-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: lenscloud-runtime-eu
  labels:
    lenscloud.io/region: eu
    lenscloud.io/managed-runtime: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lenscloud-platform
  namespace: lenscloud-platform-system
---
apiVersion: v1
kind: Secret
metadata:
  name: lenscloud-platform-token
  namespace: lenscloud-platform-system
  annotations:
    kubernetes.io/service-account.name: lenscloud-platform
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lenscloud-platform-access-reviewer
rules:
  - apiGroups:
      - authorization.k8s.io
    resources:
      - selfsubjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lenscloud-platform-access-reviewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lenscloud-platform-access-reviewer
subjects:
  - kind: ServiceAccount
    name: lenscloud-platform
    namespace: lenscloud-platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lenscloud-platform-existing-database
  namespace: default
rules:
  - apiGroups:
      - k8s.mariadb.com
    resources:
      - mariadbs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - persistentvolumeclaims
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lenscloud-platform-existing-database
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lenscloud-platform-existing-database
subjects:
  - kind: ServiceAccount
    name: lenscloud-platform
    namespace: lenscloud-platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lenscloud-platform-runtime
  namespace: lenscloud-runtime-eu
rules:
  - apiGroups:
      - k8s.mariadb.com
    resources:
      - mariadbs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - vyogo.tech
    resources:
      - frappebenches
      - frappesites
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - persistentvolumeclaims
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - delete
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lenscloud-platform-runtime
  namespace: lenscloud-runtime-eu
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lenscloud-platform-runtime
subjects:
  - kind: ServiceAccount
    name: lenscloud-platform
    namespace: lenscloud-platform-system
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: lenscloud-platform-owned-delete
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:
          - k8s.mariadb.com
        apiVersions:
          - "*"
        operations:
          - DELETE
        resources:
          - mariadbs
        scope: Namespaced
      - apiGroups:
          - vyogo.tech
        apiVersions:
          - "*"
        operations:
          - DELETE
        resources:
          - frappebenches
          - frappesites
        scope: Namespaced
      - apiGroups:
          - batch
        apiVersions:
          - "*"
        operations:
          - DELETE
        resources:
          - jobs
        scope: Namespaced
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - DELETE
        resources:
          - persistentvolumeclaims
          - secrets
        scope: Namespaced
  validations:
    - expression: >-
        request.userInfo.username !=
        'system:serviceaccount:lenscloud-platform-system:lenscloud-platform'
        || (has(oldObject.metadata.labels)
        && 'lenscloud.io/managed-by' in oldObject.metadata.labels
        && oldObject.metadata.labels['lenscloud.io/managed-by'] == 'platform')
      message: >-
        LensCloud Platform may delete only resources labelled
        lenscloud.io/managed-by=platform.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: lenscloud-platform-owned-delete
spec:
  policyName: lenscloud-platform-owned-delete
  validationActions:
    - Deny
  matchResources:
    namespaceSelector:
      matchLabels:
        lenscloud.io/managed-runtime: "true"
