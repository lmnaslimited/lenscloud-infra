apiVersion: v1
kind: Namespace
metadata:
  name: lenscloud-platform-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: lenscloud-runtime-eu
  labels:
    lenscloud.io/region: eu
    lenscloud.io/runtime-namespace: "true"
    lenscloud.io/managed-by: platform
    lenscloud.io/managed-runtime: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lenscloud-platform
  namespace: lenscloud-platform-system
---
apiVersion: v1
kind: Secret
metadata:
  name: lenscloud-platform-token
  namespace: lenscloud-platform-system
  annotations:
    kubernetes.io/service-account.name: lenscloud-platform
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lenscloud-platform-access-reviewer
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - authorization.k8s.io
    resources:
      - selfsubjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lenscloud-platform-access-reviewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lenscloud-platform-access-reviewer
subjects:
  - kind: ServiceAccount
    name: lenscloud-platform
    namespace: lenscloud-platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lenscloud-platform-existing-database
  namespace: default
rules:
  - apiGroups:
      - k8s.mariadb.com
    resources:
      - mariadbs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - persistentvolumeclaims
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lenscloud-platform-existing-database
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lenscloud-platform-existing-database
subjects:
  - kind: ServiceAccount
    name: lenscloud-platform
    namespace: lenscloud-platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lenscloud-platform-runtime
  namespace: lenscloud-runtime-eu
rules:
  - apiGroups:
      - k8s.mariadb.com
    resources:
      - mariadbs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - vyogo.tech
    resources:
      - frappebenches
      - frappesites
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - services
      - persistentvolumeclaims
      - configmaps
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - delete
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lenscloud-platform-runtime
  namespace: lenscloud-runtime-eu
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lenscloud-platform-runtime
subjects:
  - kind: ServiceAccount
    name: lenscloud-platform
    namespace: lenscloud-platform-system
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: lenscloud-platform-owned-delete
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:
          - k8s.mariadb.com
        apiVersions:
          - "*"
        operations:
          - DELETE
        resources:
          - mariadbs
        scope: Namespaced
      - apiGroups:
          - vyogo.tech
        apiVersions:
          - "*"
        operations:
          - DELETE
        resources:
          - frappebenches
          - frappesites
        scope: Namespaced
      - apiGroups:
          - batch
        apiVersions:
          - "*"
        operations:
          - DELETE
        resources:
          - jobs
        scope: Namespaced
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - DELETE
        resources:
          - persistentvolumeclaims
          - configmaps
          - secrets
        scope: Namespaced
  validations:
    - expression: >-
        request.userInfo.username !=
        'system:serviceaccount:lenscloud-platform-system:lenscloud-platform'
        || (has(oldObject.metadata.labels)
        && 'lenscloud.io/managed-by' in oldObject.metadata.labels
        && oldObject.metadata.labels['lenscloud.io/managed-by'] == 'platform')
      message: >-
        LensCloud Platform may delete only resources labelled
        lenscloud.io/managed-by=platform.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: lenscloud-platform-owned-delete
spec:
  policyName: lenscloud-platform-owned-delete
  validationActions:
    - Deny
  matchResources:
    namespaceSelector:
      matchLabels:
        lenscloud.io/managed-runtime: "true"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: lenscloud-platform-bench-command-job-create
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:
          - batch
        apiVersions:
          - "*"
        operations:
          - CREATE
          - UPDATE
        resources:
          - jobs
        scope: Namespaced
  validations:
    - expression: >-
        request.userInfo.username !=
        'system:serviceaccount:lenscloud-platform-system:lenscloud-platform'
        || (has(object.metadata.labels)
        && 'lenscloud.io/managed-by' in object.metadata.labels
        && object.metadata.labels['lenscloud.io/managed-by'] == 'platform'
        && 'lenscloud.io/resource-kind' in object.metadata.labels
        && object.metadata.labels['lenscloud.io/resource-kind'] == 'bench-command'
        && has(object.metadata.annotations)
        && 'lenscloud.io/bench-command-family' in object.metadata.annotations
        && object.metadata.annotations['lenscloud.io/bench-command-family'] in [
          'backup',
          'restore',
          'maintenance_mode',
          'developer_mode',
          'site_config',
          'cors',
          'bench_test',
          'latp'
        ]
        && object.spec.template.spec.restartPolicy == 'Never'
        && object.spec.template.spec.containers.size() == 1
        && (!has(object.spec.backoffLimit) || object.spec.backoffLimit <= 1)
        && has(object.spec.template.spec.automountServiceAccountToken)
        && object.spec.template.spec.automountServiceAccountToken == false
        && (!has(object.spec.template.spec.volumes)
          || object.spec.template.spec.volumes.all(volume, !has(volume.secret)))
        && object.spec.template.spec.containers.all(container,
          (
            container.image == 'ghcr.io/lmnaslimited/lenscloud-bench-command-runner@sha256:ab69e3ff24584e268bfa92f44c5d71e680ce1780cc8a4a9a5ce1e60b3e4bf4e7'
            || (
              object.metadata.annotations['lenscloud.io/bench-command-family'] == 'bench_test'
              && 'lenscloud.io/bench-command' in object.metadata.annotations
              && object.metadata.annotations['lenscloud.io/bench-command'] == 'bench_test.status'
              && container.image == 'busybox:1.36'
            )
          )
          &&
          (!has(container.envFrom) || container.envFrom.size() == 0)
          && (!has(container.securityContext)
            || (!has(container.securityContext.privileged)
              || container.securityContext.privileged == false))))
      message: >-
        LensCloud Platform may create only labelled bench-command Jobs with an
        approved command family, approved runner image, one non-privileged
        container, no Secret volumes, no envFrom, no service-account token,
        restartPolicy Never, and backoffLimit <= 1.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: lenscloud-platform-bench-command-job-create
spec:
  policyName: lenscloud-platform-bench-command-job-create
  validationActions:
    - Deny
  matchResources:
    namespaceSelector:
      matchLabels:
        lenscloud.io/managed-runtime: "true"
