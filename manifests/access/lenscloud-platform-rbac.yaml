apiVersion: v1
kind: Namespace
metadata:
  name: lenscloud-platform-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: lenscloud-runtime-eu
  labels:
    lenscloud.io/region: eu
    lenscloud.io/managed-runtime: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lenscloud-platform
  namespace: lenscloud-platform-system
---
apiVersion: v1
kind: Secret
metadata:
  name: lenscloud-platform-token
  namespace: lenscloud-platform-system
  annotations:
    kubernetes.io/service-account.name: lenscloud-platform
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lenscloud-platform-access-reviewer
rules:
  - apiGroups:
      - authorization.k8s.io
    resources:
      - selfsubjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lenscloud-platform-access-reviewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lenscloud-platform-access-reviewer
subjects:
  - kind: ServiceAccount
    name: lenscloud-platform
    namespace: lenscloud-platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lenscloud-platform-existing-database
  namespace: default
rules:
  - apiGroups:
      - k8s.mariadb.com
    resources:
      - mariadbs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - persistentvolumeclaims
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lenscloud-platform-existing-database
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lenscloud-platform-existing-database
subjects:
  - kind: ServiceAccount
    name: lenscloud-platform
    namespace: lenscloud-platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lenscloud-platform-runtime
  namespace: lenscloud-runtime-eu
rules:
  - apiGroups:
      - k8s.mariadb.com
    resources:
      - mariadbs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - vyogo.tech
    resources:
      - frappebenches
      - frappesites
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - persistentvolumeclaims
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lenscloud-platform-runtime
  namespace: lenscloud-runtime-eu
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lenscloud-platform-runtime
subjects:
  - kind: ServiceAccount
    name: lenscloud-platform
    namespace: lenscloud-platform-system
