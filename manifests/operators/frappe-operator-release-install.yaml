  fpmRepositories: |
    [
      {
        "name": "frappe-community",
        "url": "https://fpm.frappe.io",
        "priority": 100
      }
    ]
  gitEnabled: "false"
  ingressControllerNamespace: ingress-nginx
  ingressControllerService: ingress-nginx-controller
  maxConcurrentSiteReconciles: "10"
