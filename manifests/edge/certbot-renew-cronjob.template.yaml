apiVersion: batch/v1
kind: CronJob
metadata:
  name: certbot-wildcard-renew
  namespace: lenscloud-edge
spec:
  schedule: "17 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: certbot-wildcard
          restartPolicy: Never
          nodeSelector:
            lenscloud.io/node-role: worker
          containers:
            - name: certbot
              image: ${CERTBOT_IMAGE}
              imagePullPolicy: IfNotPresent
              args: ["renew"]
              env:
                - name: CERTBOT_EMAIL
                  value: ${CERTBOT_EMAIL}
                - name: TLS_SECRET_NAMESPACE
                  value: traefik
                - name: TLS_SECRET_NAME
                  value: lenscloud-cloud-wildcard-tls
              volumeMounts:
                - name: certbot-state
                  mountPath: /etc/letsencrypt
                - name: godaddy-credentials
                  mountPath: /var/run/godaddy
                  readOnly: true
          volumes:
            - name: certbot-state
              persistentVolumeClaim:
                claimName: certbot-state
            - name: godaddy-credentials
              secret:
                secretName: godaddy-dns-api
                defaultMode: 0400
