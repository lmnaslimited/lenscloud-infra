apiVersion: vyogo.tech/v1
kind: FrappeBench
metadata:
  name: handoff-bench
  namespace: default
  labels:
    lenscloud.io/test-purpose: cluster-handoff
spec:
  frappeVersion: "16"
  podConfig:
    nodeSelector:
      lenscloud.io/node-role: worker
  imageConfig:
    repository: ghcr.io/lmnaslimited/lensdocker/lens-pure
    tag: v16.14.1
    pullPolicy: IfNotPresent
  apps:
    - name: ERPNext
      source: image
  componentAutoscaling:
    gunicorn:
      enabled: false
      staticReplicas: 1
    scheduler:
      enabled: false
      staticReplicas: 0
    worker-default:
      enabled: false
      staticReplicas: 0
    worker-short:
      enabled: false
      staticReplicas: 0
    worker-long:
      enabled: false
      staticReplicas: 0
  componentResources:
    nginx:
      requests:
        cpu: 25m
        memory: 64Mi
    gunicorn:
      requests:
        cpu: 50m
        memory: 128Mi
    socketio:
      requests:
        cpu: 25m
        memory: 64Mi
    scheduler:
      requests:
        cpu: 25m
        memory: 64Mi
    workerDefault:
      requests:
        cpu: 25m
        memory: 64Mi
    workerShort:
      requests:
        cpu: 25m
        memory: 64Mi
    workerLong:
      requests:
        cpu: 25m
        memory: 64Mi
  storageClassName: local-path
  storageSize: 3Gi
  dbConfig:
    provider: mariadb
    mode: shared
    mariadbRef:
      name: frappe-mariadb
      namespace: default
