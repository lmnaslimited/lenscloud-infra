apiVersion: vyogo.tech/v1
kind: FrappeSite
metadata:
  name: shared-db-site-a
  namespace: default
spec:
  benchRef:
    name: shared-db-bench-a
  siteName: shared-db-a.cloud.lmnaslens.com
  domain: shared-db-a.cloud.lmnaslens.com
  adminPasswordSecretRef:
    name: shared-db-site-a-admin-password
  ingressClassName: traefik
  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
  tls:
    enabled: false
---
